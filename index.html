<style>

  .progress-bg{flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--rose);border-radius:2px;transition:width 0.5s ease;}
  .progress-label{font-size:11px;color:rgba(255,255,255,0.35);white-space:nowrap;}

  .sent-indicator{font-size:12px;color:var(--green);margin-bottom:8px;height:18px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:white;color:var(--deep);padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:999;white-space:nowrap;}

</div>

const START_DATE_KEY = 'pp_group_start';
const SENT_KEY = 'pp_sent_days';

function getStartDate() {
  let d = localStorage.getItem(START_DATE_KEY);
  if (!d) {
    d = new Date().toISOString().split('T')[0];
    localStorage.setItem(START_DATE_KEY, d);
  }
  return new Date(d);
}

function getDayNumber(forDate) {
  const start = getStartDate();
  const target = forDate || new Date();
  const diff = Math.floor((new Date(target.toDateString()) - new Date(start.toDateString())) / 86400000);
  return Math.max(0, Math.min(diff, 119));
}

function getSentDays() {
  return JSON.parse(localStorage.getItem(SENT_KEY) || '[]');
}

function markDaySent(dayNum) {
  const sent = getSentDays();
  if (!sent.includes(dayNum)) { sent.push(dayNum); localStorage.setItem(SENT_KEY, JSON.stringify(sent)); }
}

function render() {
  const dayNum = viewingDay;
  const quote = quotes[dayNum] || quotes[0];
  const task = tasks[dayNum] || tasks[0];
  const phase = phases[dayNum] || phases[0];
  const sent = getSentDays().includes(dayNum);

  document.getElementById('quoteText').textContent = quote.text;
  document.getElementById('quoteCategory').textContent = quote.cat;
  document.getElementById('taskText').textContent = task;
  document.getElementById('phaseLabel').textContent = phase.label;
  document.getElementById('phaseTitle').textContent = phase.title;
  document.getElementById('phaseDesc').textContent = phase.desc;
  document.getElementById('dayNumSmall').textContent = dayNum + 1;

  const d = new Date(getStartDate());
  d.setDate(d.getDate() + dayNum);
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});

  const pct = ((dayNum + 1) / 120 * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Day ' + (dayNum+1) + ' of 120';

  document.getElementById('sentIndicator').textContent = sent ? '✓ Sent today' : '';
  document.getElementById('sendBtn').style.opacity = sent ? '0.5' : '1';
}

// Days that start a new phase
const phaseStartDays = [0, 7, 14, 21, 60, 90];

function sendToGila() {
  const dayNum = viewingDay;
  const task = tasks[dayNum] || tasks[0];
  const phase = phases[dayNum] || phases[0];

  const isNewPhase = phaseStartDays.includes(dayNum);
  const phaseBlock = isNewPhase ? `\n${phase.desc}\n` : '';

  const msg = `Day ${dayNum+1} — ${phase.label}: ${phase.title}\n${phaseBlock}\n*Task today:* ${task}`;
  const encoded = encodeURIComponent(msg);
  window.open('https://wa.me/447831916622?text=' + encoded, '_blank');
  markDaySent(dayNum);
  render();
  showToast('Opening WhatsApp ✓');
}

function changeDay(dir) {
  viewingDay = Math.max(0, Math.min(119, viewingDay + dir));

}

function goToday() {

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function downloadPNG(){
  var btns=document.querySelectorAll('.send-btn,.sent-btn,.dl-btn,.nav-row,.feedback-btn');
  btns.forEach(function(b){b.style.display='none';});
  html2canvas(document.querySelector('.wrap'),{backgroundColor:'#8b4a3c',scale:2,useCORS:true,logging:false})
  .then(function(canvas){
    btns.forEach(function(b){b.style.display='';});
    var out=document.createElement('canvas');
    out.width=1080;out.height=1920;
    var ctx=out.getContext('2d');
    ctx.fillStyle='#8b4a3c';
    ctx.fillRect(0,0,1080,1920);
    var s=Math.min(1000/canvas.width,1600/canvas.height);
    ctx.drawImage(canvas,(1080-canvas.width*s)/2,(1920-canvas.height*s)/2,canvas.width*s,canvas.height*s);
    out.toBlob(function(blob){
      var file=new File([blob],'day.png',{type:'image/png'});
      navigator.share({files:[file]}).catch(function(){});
    },'image/png');
  })
  .catch(function(){btns.forEach(function(b){b.style.display='';});});
}
